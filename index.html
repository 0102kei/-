  --mission-accent: var(--blue);
  --mission-accent-soft: rgba(10, 132, 255, 0.12);
  --shadow: 0 18px 54px rgba(15, 23, 42, 0.12);
  --inner-light: inset 0 1px 0 rgba(255, 255, 255, 0.92);
  --glass-border: rgba(255, 255, 255, 0.52);
}

body.dark {
  color-scheme: dark;
  --bg: #05070d;
  --panel: rgba(20, 25, 38, 0.86);
  --panel-strong: rgba(24, 30, 44, 0.94);
  --text: #f8fafc;
  --muted: #aeb8c8;
  --line: rgba(172, 190, 216, 0.2);
  --green: #41d69f;
  --green-dark: #26a87a;
  --red: #ff756a;
  --red-dark: #df5348;
  --blue: #77a4ff;
  --cyan: #64d7ff;
  --pink: #ff8fc6;
  --purple: #d7a6ff;
  --orange: #ffc46b;
  --yellow: #ffd166;
  --soft-blue: rgba(119, 164, 255, 0.18);
  --mission-accent: var(--blue);
  --mission-accent-soft: rgba(119, 164, 255, 0.18);
  --shadow: 0 20px 70px rgba(0, 0, 0, 0.38);
  --inner-light: inset 0 1px 0 rgba(255, 255, 255, 0.13);
  --glass-border: rgba(255, 255, 255, 0.14);
}

body[data-accent="training"] {
  --mission-accent: var(--green);
  --mission-accent-soft: rgba(32, 201, 151, 0.14);
}

body[data-accent="reading"] {
  --mission-accent: var(--blue);
  --mission-accent-soft: rgba(10, 132, 255, 0.13);
}

body[data-accent="focus"] {
  --mission-accent: var(--purple);
  --mission-accent-soft: rgba(175, 82, 222, 0.13);
}

body[data-accent="saving"] {
  --mission-accent: var(--orange);
  --mission-accent-soft: rgba(255, 159, 10, 0.16);
}

body:not(.timer-countdown) .countdown-options {
  display: none;
}

* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  background:
    radial-gradient(circle at 16% 6%, rgba(10, 132, 255, 0.18), transparent 30%),
    radial-gradient(circle at 82% 7%, rgba(255, 45, 146, 0.14), transparent 28%),
    radial-gradient(circle at 12% 82%, rgba(90, 200, 250, 0.14), transparent 32%),
    var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body::before {
  display: none;
  position: absolute;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  content: "";
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.5), transparent 24%, transparent 76%, rgba(255, 255, 255, 0.42)),
    linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 34%),
    repeating-linear-gradient(90deg, rgba(17, 24, 39, 0.024) 0 1px, transparent 1px 96px);
  mask-image: linear-gradient(to bottom, black 0 55%, transparent 92%);
}

body::after {
  display: none;
  position: fixed;
  inset: auto 0 0;
  z-index: -1;
  height: 42vh;
  pointer-events: none;
  content: "";
  background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.72));
}

button,
input,
textarea {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
  touch-action: manipulation;
}

.app {
  width: min(100%, 980px);
  margin: 0 auto;
  padding: 30px 20px 38px;
}

.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 26px 2px 32px;
}

.hero-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.language-select {
  width: auto;
  min-width: 116px;
}

.eyebrow {
  margin: 0 0 4px;
  background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: clamp(2.5rem, 8vw, 5.1rem);
  line-height: 1;
  letter-spacing: 0;
  background: linear-gradient(100deg, #0f172a 0%, var(--blue) 34%, var(--purple) 63%, var(--pink) 88%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

h2 {
  margin-bottom: 14px;
  font-size: 1.05rem;
}

.icon-button {
  display: grid;
  place-items: center;
  width: 54px;
  height: 54px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.46)),
    var(--panel-strong);
  color: var(--text);
  box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12), var(--inner-light);
  backdrop-filter: blur(28px) saturate(1.55);
}

.counter-panel,
.tool-panel,
.history-panel {
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.42)),
    var(--panel-strong);
  box-shadow: var(--shadow), var(--inner-light);
  backdrop-filter: blur(22px) saturate(1.28);
}

.counter-panel {
  position: relative;
  overflow: hidden;
  padding: 34px 22px 24px;
  text-align: center;
}

.counter-panel::before {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  content: "";
  background:
    radial-gradient(circle at 20% 20%, rgba(10, 132, 255, 0.14), transparent 34%),
    radial-gradient(circle at 82% 24%, rgba(255, 45, 146, 0.12), transparent 34%),
    linear-gradient(120deg, transparent 0 18%, rgba(255, 255, 255, 0.5) 34%, transparent 52%);
  opacity: 0.08;
}

.counter-panel > * {
  position: relative;
  z-index: 1;
}

.counter-label,
.counter-sub,
.small-note {
  color: var(--muted);
}

.counter-label {
  margin-bottom: 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0;
}

.counter-value {
  display: block;
  overflow-wrap: anywhere;
  font-size: clamp(4.6rem, 23vw, 9.8rem);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: 0;
  background: none;
  -webkit-background-clip: initial;
  background-clip: initial;
  color: var(--text);
  text-shadow: 0 18px 42px rgba(10, 132, 255, 0.14);
}

.counter-value.count-pop-plus {
  animation: countPopPlus 210ms ease-out;
}

.counter-value.count-pop-minus {
  animation: countPopMinus 210ms ease-out;
}

.counter-sub {
  min-height: 1.5em;
  margin: 12px 0 12px;
}

.progress-area {
  width: min(100%, 560px);
  margin: 0 auto 14px;
}

.progress-track {
  position: relative;
  height: 12px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.64);
  box-shadow: inset 0 1px 4px rgba(18, 24, 38, 0.08);
}

body.dark .progress-track {
  background: #243449;
}

.progress-fill {
  position: relative;
  width: 0%;
  height: 100%;
  border-radius: 8px;
  background: linear-gradient(90deg, var(--green), var(--cyan), var(--blue), var(--purple), var(--pink));
  box-shadow: 0 0 28px rgba(10, 132, 255, 0.34);
  transition: width 220ms ease;
}

.progress-fill::after {
  position: absolute;
  inset: 0;
  content: "";
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.72), transparent);
  transform: translateX(-120%);
}

.progress-fill.progress-sheen::after {
  animation: progressSheen 520ms ease-out;
}

.progress-text {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 0.92rem;
  font-weight: 700;
}

.counter-stats,
.counter-tools {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
}

.counter-stats {
  margin-bottom: 12px;
}

.counter-stats span {
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.7)),
    rgba(255, 255, 255, 0.78);
  color: var(--text);
  font-size: 0.88rem;
  font-weight: 800;
  box-shadow: var(--inner-light);
  backdrop-filter: blur(16px);
}

.counter-tools {
  margin-bottom: 18px;
}

.floating-timer {
  position: fixed;
  right: max(14px, env(safe-area-inset-right));
  bottom: calc(124px + env(safe-area-inset-bottom));
  z-index: 30;
  display: none;
  min-width: 132px;
  padding: 10px 14px;
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.68)),
    var(--panel-strong);
  box-shadow: 0 16px 42px rgba(15, 23, 42, 0.2), var(--inner-light);
  color: var(--text);
  text-align: center;
  backdrop-filter: blur(20px) saturate(1.32);
}

body.timer-active .floating-timer {
  display: block;
}

.floating-timer span {
  display: block;
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 900;
}

.floating-timer output {
  display: block;
  font-size: 1.3rem;
  font-weight: 950;
  line-height: 1.1;
}

.inline-reset-button,
.undo-button {
  min-height: 42px;
  padding: 0 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.72)),
    rgba(255, 255, 255, 0.82);
  color: #182331;
  font-weight: 800;
  box-shadow: var(--inner-light);
}

body.dark .inline-reset-button,
body.dark .undo-button {
  background: #243449;
  color: var(--text);
}

.undo-button:disabled {
  cursor: not-allowed;
  opacity: 0.48;
}

.main-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.action-button {
  min-height: 108px;
  border-radius: 8px;
  color: white;
  text-shadow: 0 1px 10px rgba(0, 0, 0, 0.22);
  font-size: clamp(1.18rem, 5vw, 1.62rem);
  font-weight: 800;
  box-shadow: 0 20px 52px rgba(18, 24, 38, 0.22), var(--inner-light);
  transition:
    transform 160ms ease,
    filter 160ms ease,
    box-shadow 160ms ease;
}

.action-button span {
  display: block;
  margin-bottom: 4px;
  font-size: 2.7rem;
  line-height: 1;
}

.minus {
  background:
    radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.55), transparent 24%),
    linear-gradient(135deg, #ff8a80, #ff453a 58%, var(--red-dark));
}

.minus:active {
  background: var(--red-dark);
  transform: translateY(1px) scale(0.99);
}

.plus {
  background:
    radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.54), transparent 24%),
    linear-gradient(135deg, var(--green), var(--cyan) 44%, var(--blue));
}

.plus:active {
  background: var(--green-dark);
  transform: translateY(1px) scale(0.99);
}

.action-button:hover {
  filter: brightness(1.04) saturate(1.06);
  box-shadow: 0 24px 62px rgba(10, 132, 255, 0.22), var(--inner-light);
}

.quick-actions,
.mini-actions,
.segmented {
  display: grid;
  gap: 8px;
}

.quick-actions {
  grid-template-columns: repeat(4, 1fr);
  margin-top: 12px;
}

.quick-actions button,
.mini-actions button,
.segmented button,
.wide-button,
.history-head button,
.history-actions button {
  min-height: 44px;
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.72)),
    rgba(255, 255, 255, 0.82);
  color: #182331;
  font-weight: 700;
  box-shadow: var(--inner-light);
  transition:
    transform 150ms ease,
    background 150ms ease;
}

.quick-actions button:active,
.mini-actions button:active,
.segmented button:active,
.wide-button:active,
.history-head button:active,
.history-actions button:active,
.inline-reset-button:active,
.undo-button:active {
  transform: scale(0.98);
}

body.dark .quick-actions button,
body.dark .mini-actions button,
body.dark .segmented button,
body.dark .wide-button,
body.dark .history-head button,
body.dark .history-actions button {
  background: #243449;
  color: var(--text);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-top: 14px;
}

.advanced-shell {
  margin-top: 14px;
}

.advanced-shell > summary {
  display: block;
  padding: 16px 18px;
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.64)),
    var(--panel-strong);
  box-shadow: var(--shadow), var(--inner-light);
  color: var(--text);
  cursor: pointer;
  font-weight: 900;
  backdrop-filter: blur(18px) saturate(1.2);
}

.advanced-shell > summary::after {
  float: right;
  content: "+";
  color: var(--muted);
  font-size: 0.86rem;
}

.advanced-shell[open] > summary::after {
  content: "-";
}

.tool-panel,
.history-panel {
  padding: 20px;
}

.field {
  display: grid;
  gap: 7px;
  margin-bottom: 12px;
  color: var(--muted);
  font-weight: 700;
}

.field + .mini-actions {
  margin-bottom: 12px;
}

input,
textarea,
select {
  width: 100%;
  min-height: 46px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.86);
  color: var(--text);
  padding: 12px;
  box-shadow: var(--inner-light);
}

textarea {
  resize: vertical;
}

select {
  cursor: pointer;
}

.mini-actions {
  grid-template-columns: repeat(2, 1fr);
}

.time-value {
  display: block;
  margin-bottom: 12px;
  font-size: clamp(2rem, 11vw, 3.5rem);
  font-weight: 900;
  line-height: 1;
}

.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  color: var(--muted);
  font-weight: 700;
}

.toggle-row input {
  width: 22px;
  height: 22px;
}

.segmented {
  grid-template-columns: 1fr 1fr;
  margin-bottom: 10px;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.5);
}

.segmented .active,
.wide-button.running,
#timerToggleButton.running {
  background: var(--blue);
  background: linear-gradient(135deg, var(--blue), var(--cyan), var(--purple));
  color: white;
}

.small-note {
  margin: 10px 0 0;
  font-size: 0.9rem;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.stat-grid div {
  display: grid;
  gap: 6px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.7)),
    rgba(255, 255, 255, 0.82);
  box-shadow: var(--inner-light);
}

.stat-grid span {
  color: var(--muted);
  font-size: 0.86rem;
  font-weight: 800;
}

.stat-grid strong {
  font-size: 2rem;
  line-height: 1;
}

.mission-card {
  display: grid;
  gap: 10px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(135deg, var(--mission-accent-soft), rgba(255, 45, 146, 0.07)),
    rgba(255, 255, 255, 0.78);
  box-shadow: var(--inner-light);
}

.mission-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.mission-top strong {
  font-size: 1.05rem;
}

.mission-badge {
  padding: 7px 10px;
  border-radius: 8px;
  background: var(--mission-accent-soft);
  color: var(--mission-accent);
  font-size: 0.78rem;
  font-weight: 900;
}

.mission-detail {
  margin: 0;
  color: var(--muted);
  font-weight: 700;
}

.preset-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
}

.mini-graph {
  display: grid;
  grid-template-columns: repeat(8, minmax(18px, 1fr));
  align-items: end;
  min-height: 96px;
  gap: 8px;
  margin-top: 8px;
}

.mini-graph-item {
  display: grid;
  align-items: end;
  gap: 6px;
  min-width: 0;
}

.mini-graph-bar {
  display: block;
  min-height: 8px;
  border-radius: 8px 8px 4px 4px;
  background: linear-gradient(180deg, var(--cyan), var(--mission-accent), var(--purple));
  box-shadow: 0 10px 24px rgba(10, 132, 255, 0.22);
}

.mini-graph-label {
  overflow: hidden;
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 800;
  text-align: center;
  text-overflow: ellipsis;
}

.empty-graph {
  grid-column: 1 / -1;
  align-self: center;
  color: var(--muted);
  font-weight: 700;
  text-align: center;
}

.history-panel {
  margin-top: 14px;
}

.history-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.history-head h2 {
  margin-bottom: 0;
}

.history-actions {
  display: flex;
  gap: 8px;
}

.history-list {
  display: grid;
  gap: 8px;
  margin: 14px 0 0;
  padding-left: 22px;
}

.history-list li {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.82);
  box-shadow: var(--inner-light);
}

.history-list span {
  overflow-wrap: anywhere;
}

.delete-history-button {
  min-width: 44px;
  min-height: 44px;
  border-radius: 8px;
  background: rgba(238, 93, 82, 0.12);
  color: var(--red);
  font-weight: 900;
}

button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible,
summary:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--mission-accent) 72%, white);
  outline-offset: 3px;
}

body.dark input,
body.dark textarea,
body.dark select,
body.dark .counter-stats span,
body.dark .stat-grid div,
body.dark .history-list li,
body.dark .mission-card {
  background: rgba(24, 34, 52, 0.74);
}

.counter-panel.milestone-ring::after {
  position: absolute;
  inset: 22px;
  z-index: 0;
  pointer-events: none;
  content: "";
  border: 2px solid rgba(10, 132, 255, 0.36);
  border-radius: 8px;
  animation: milestoneRing 760ms ease-out;
}

@keyframes countPopPlus {
  0% {
    transform: scale(1);
    color: var(--text);
  }
  45% {
    transform: scale(1.035);
    color: var(--blue);
    text-shadow: 0 0 34px rgba(90, 200, 250, 0.35);
  }
  100% {
    transform: scale(1);
    color: var(--text);
  }
}

@keyframes countPopMinus {
  0% {
    transform: scale(1);
    color: var(--text);
  }
  45% {
    transform: scale(0.982);
    color: var(--red);
    text-shadow: 0 0 30px rgba(255, 107, 107, 0.28);
  }
  100% {
    transform: scale(1);
    color: var(--text);
  }
}

@keyframes progressSheen {
  from {
    transform: translateX(-120%);
  }
  to {
    transform: translateX(120%);
  }
}

@keyframes milestoneRing {
  0% {
    opacity: 0.9;
    transform: scale(0.96);
  }
  100% {
    opacity: 0;
    transform: scale(1.06);
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}

@media (max-width: 720px) {
  .app {
    padding: 14px 14px 106px;
  }

  .grid,
  .mini-actions {
    grid-template-columns: 1fr;
  }

  .main-actions {
    position: sticky;
    bottom: calc(10px + env(safe-area-inset-bottom));
    z-index: 20;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: color-mix(in srgb, var(--panel) 92%, transparent);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }

  .action-button {
    min-height: 104px;
    font-size: 1.12rem;
  }

  .action-button span {
    font-size: 3rem;
  }

  body.timer-active .main-actions {
    padding-top: 12px;
  }

  .quick-actions {
    grid-template-columns: repeat(4, 1fr);
  }

  .counter-panel,
  .tool-panel,
  .history-panel {
    padding: 16px;
  }

  .counter-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
  }

  .history-head {
    align-items: stretch;
    flex-direction: column;
  }

  .preset-grid {
    grid-template-columns: 1fr;
  }
}

@media (min-width: 721px) {

          <span id="targetStat">目標 10</span>
          <span id="remainingStat">残り 10</span>
          <span id="limitStat">上限なし</span>
        </div>
        <div class="counter-tools">
          <button class="inline-reset-button" id="inlineResetButton" type="button">0に戻す</button>
          <button class="undo-button" id="undoButton" type="button" disabled>戻す</button>
        </div>

        <div class="main-actions">
          <button class="action-button minus" id="minusButton" type="button">

          </button>
          <button class="action-button plus" id="plusButton" type="button">
            <span aria-hidden="true">＋</span>
            増やす
          </button>
        </div>

        <div class="quick-actions" aria-label="よく使う操作">
          <button type="button" data-quick="-10">-10</button>
          <button type="button" data-quick="-5">-5</button>
          <button type="button" data-quick="5">+5</button>
          <button type="button" data-quick="10">+10</button>
        </div>
      </section>

      <div class="floating-timer" aria-live="polite">
        <span id="floatingTimerLabel">タイマー</span>
        <output id="floatingTimeValue">00:00.0</output>
      </div>

        <article class="tool-panel timer-panel">

              <label class="field">
                <span>秒</span>
                <input id="countdownSecondsInput" type="number" min="0" max="59" value="0" inputmode="numeric" />

              <button type="button" data-countdown-preset="300">5分</button>
              <button type="button" data-countdown-preset="600">10分</button>

          </label>

      </section>

      <details class="advanced-shell">
        <summary>細かい設定・記録を開く</summary>
      <section class="grid">
        <article class="tool-panel">
          <h2>カウント設定</h2>
          <label class="field">
            <span>カウント名</span>
            <input id="counterNameInput" type="text" value="カウンター" maxlength="24" />
          </label>

            <select id="counterSelect"></select>
          </label>

              <option value="down">減らして0へ</option>

            <button id="resetButton" type="button">0に戻す</button>
            <button id="targetButton" type="button">目標まで増やす</button>

        <article class="tool-panel">

          </div>
          <p class="small-note">名前、1回の数、目標、メモをまとめて入れます。</p>
        </article>

        <article class="tool-panel">
          <h2>自動カウント</h2>
          <label class="field">
            <span>何秒ごとに動かすか</span>
            <input id="intervalInput" type="number" min="1" max="60" value="1" inputmode="numeric" />

          </div>
          <button class="wide-button" id="autoToggleButton" type="button">自動カウント開始</button>
        </article>

        <article class="tool-panel">

            <button type="button" data-memo-preset="reading">読書</button>
            <button type="button" data-memo-preset="focus">作業</button>
            <button type="button" data-memo-preset="saving">貯金</button>
          </div>
          <textarea id="memoInput" rows="5" placeholder="例：腕立て、読書ページ数、作業回数など"></textarea>
        </article>

        <article class="tool-panel stats-panel">

            <div>

          <div class="mini-graph" id="miniGraph" aria-label="最近のカウント履歴"></div>

        <ol id="historyList" class="history-list"></ol>
      </section>

function text(key, values = {}) {
  const template = i18n[languageSelect.value]?.[key] ?? i18n.ja[key] ?? key;
  return template.replaceAll(/\{(\w+)\}/g, (_, name) => values[name] ?? "");
}

function presetLabel(key) {
  return text(`preset${key[0].toUpperCase()}${key.slice(1)}`);
}

function presetMemo(key) {
  return text(`memo${key[0].toUpperCase()}${key.slice(1)}`);
}

function setText(selector, key) {
  const element = document.querySelector(selector);
  if (element) element.textContent = text(key);
}

function setLabelText(input, key) {
  input.closest("label")?.querySelector("span")?.replaceChildren(text(key));
}

function setActionButtonText(button, key) {
  const textNode = Array.from(button.childNodes)
    .filter((node) => node.nodeType === Node.TEXT_NODE)
    .at(-1);
  if (textNode) {
    textNode.textContent = `\n            ${text(key)}\n          `;
  }
}

function getTodayKey() {
  return new Date().toLocaleDateString("sv-SE");
}

const app = {
  count: 0,
  history: [],
  undoStack: [],
  dailyDate: getTodayKey(),
  todayTotal: 0,
  todayHigh: 0,
  counters: [],
  currentCounterId: "",
  dark: false,
  presetAccent: "reading",
  timerRunning: false,
  timerStartedAt: 0,
  elapsedBeforeStart: 0,
  autoRunning: false,
  autoDirection: 1,
  autoTimerId: null,
  timerFrameId: null,
};

function safeNumber(value, fallback) {
  const number = Number(value);
  return Number.isFinite(number) ? number : fallback;
}

function makeId() {
  return `counter-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function makeCounter(name = text("counterDefault")) {
  return {
    id: makeId(),
    name,
    count: 0,
    step: "1",
    target: "10",
    limit: "100",
    limitMode: "none",
    countMode: "up",
    presetAccent: "reading",
    memo: "",
    history: [],
    undoStack: [],
    dailyDate: getTodayKey(),
    todayTotal: 0,
    todayHigh: 0,
  };
}

function currentCounter() {
  return app.counters.find((counter) => counter.id === app.currentCounterId) ?? app.counters[0];
}

function getStep() {
  const step = Math.abs(safeNumber(stepInput.value, 1));
  return Math.max(1, step);
}

function getLimit() {
  const limit = Math.abs(safeNumber(limitInput.value, 100));
  return Math.max(1, limit);
}

function getTarget() {
  const target = Math.abs(safeNumber(targetInput.value, 10));
  return Math.max(1, target);
}

function getMemoText() {
  const memo = memoInput.value.trim();
  return memo ? ` / ${memo}` : "";
}

function resetDailyStatsIfNeeded() {
  const currentToday = getTodayKey();
  if (app.dailyDate === currentToday) return;
  app.dailyDate = currentToday;
  app.todayTotal = 0;
  app.todayHigh = Math.max(0, app.count);
}

function saveActiveCounter() {
  const counter = currentCounter();
  if (!counter) return;

  counter.name = counterNameInput.value.trim() || text("counterDefault");
  counter.count = app.count;
  counter.step = stepInput.value;
  counter.target = targetInput.value;
  counter.limit = limitInput.value;
  counter.limitMode = limitModeSelect.value;
  counter.countMode = countModeSelect.value;
  counter.presetAccent = app.presetAccent;
  counter.memo = memoInput.value;
  counter.history = app.history;
  counter.undoStack = app.undoStack;
  counter.dailyDate = app.dailyDate;
  counter.todayTotal = app.todayTotal;
  counter.todayHigh = app.todayHigh;
}

function applyCounter(counter) {
  app.currentCounterId = counter.id;
  app.count = safeNumber(counter.count, 0);
  app.history = Array.isArray(counter.history) ? counter.history : [];
  app.undoStack = Array.isArray(counter.undoStack)
    ? counter.undoStack
    : counter.lastCount === null || counter.lastCount === undefined
      ? []
      : [counter.lastCount];
  app.dailyDate = counter.dailyDate ?? getTodayKey();
  app.todayTotal = safeNumber(counter.todayTotal, 0);
  app.todayHigh = safeNumber(counter.todayHigh, Math.max(0, app.count));
  app.presetAccent = counter.presetAccent ?? "reading";

  counterNameInput.value = counter.name ?? text("counterDefault");
  stepInput.value = counter.step ?? 1;
  targetInput.value = counter.target ?? 10;
  limitInput.value = counter.limit ?? 100;
  limitModeSelect.value = counter.limitMode ?? "none";
  countModeSelect.value = counter.countMode ?? "up";
  memoInput.value = counter.memo ?? "";
  resetDailyStatsIfNeeded();
}

function migrateOldSave(saved) {
  const counter = makeCounter(text("counterDefault"));
  counter.count = safeNumber(saved.count, 0);
  counter.step = saved.step ?? 1;
  counter.target = saved.target ?? 10;
  counter.limit = saved.limit ?? 100;
  counter.limitMode = saved.limitMode ?? "none";
  counter.presetAccent = saved.presetAccent ?? "reading";
  counter.memo = saved.memo ?? "";
  counter.history = Array.isArray(saved.history) ? saved.history : [];
  counter.undoStack = saved.lastCount === null || saved.lastCount === undefined ? [] : [saved.lastCount];
  counter.todayHigh = Math.max(0, counter.count);
  return {
    version: 2,
    counters: [counter],
    currentCounterId: counter.id,
    dark: Boolean(saved.dark),
    language: saved.language ?? "ja",
    timerMode: saved.timerMode ?? "stopwatch",
    countdownMinutes: saved.countdownMinutes ?? "5",
    countdownSeconds: saved.countdownSeconds ?? "0",
    autoCount: saved.autoCount ?? false,
    stopAutoWithTimer: saved.stopAutoWithTimer ?? true,
    sound: false,
    vibrate: false,
  };
}

function save() {
  try {
    saveActiveCounter();
    localStorage.setItem(
      storageKey,
      JSON.stringify({
        version: 2,
        counters: app.counters,
        currentCounterId: app.currentCounterId,
        dark: app.dark,
        language: languageSelect.value,
        timerMode: timerModeSelect.value,
        countdownMinutes: countdownMinutesInput.value,
        countdownSeconds: countdownSecondsInput.value,
        autoCount: autoCountToggle.checked,
        stopAutoWithTimer: stopAutoWithTimerToggle.checked,
        sound: soundToggle.checked,
        vibrate: vibrateToggle.checked,
      })
    );
  } catch (error) {
    statusText.textContent = text("saveFailed");
    console.warn("保存できませんでした。ブラウザの設定を確認してください。", error);
  }
}

function load() {
  try {
    const savedText = localStorage.getItem(storageKey);
    const saved = savedText ? JSON.parse(savedText) : null;
    const data = saved?.version === 2 ? saved : migrateOldSave(saved ?? {});

    app.counters = Array.isArray(data.counters) && data.counters.length > 0 ? data.counters : [makeCounter()];
    app.currentCounterId = data.currentCounterId ?? app.counters[0].id;
    app.dark = Boolean(data.dark);
    languageSelect.value = data.language ?? "ja";
    timerModeSelect.value = data.timerMode ?? "stopwatch";
    countdownMinutesInput.value = data.countdownMinutes ?? "5";
    countdownSecondsInput.value = data.countdownSeconds ?? "0";
    autoCountToggle.checked = data.autoCount ?? false;
    stopAutoWithTimerToggle.checked = data.stopAutoWithTimer ?? true;
    soundToggle.checked = data.sound ?? false;
    vibrateToggle.checked = data.vibrate ?? false;

    applyCounter(currentCounter());
  } catch (error) {
    localStorage.removeItem(storageKey);
    app.counters = [makeCounter()];
    applyCounter(app.counters[0]);
    statusText.textContent = text("saveReloaded");
    console.warn("保存データを読み込めなかったため、初期状態に戻しました。", error);
  }
}

function renderCounterOptions() {
  counterSelect.innerHTML = "";
  app.counters.forEach((counter) => {
    const option = document.createElement("option");
    option.value = counter.id;
    option.textContent = counter.name || text("counterDefault");
    counterSelect.appendChild(option);
  });
  counterSelect.value = app.currentCounterId;
  deleteCounterButton.disabled = app.counters.length <= 1;
}

function renderMission(target, remaining, isDownMode) {
  const name = counterNameInput.value.trim() || text("counterDefault");
  const memo = memoInput.value.trim();
  const achieved = isDownMode ? app.count <= 0 : app.count >= target;
  const percent = isDownMode
    ? Math.min(100, Math.max(0, ((target - app.count) / target) * 100))
    : Math.min(100, Math.max(0, (app.count / target) * 100));

  missionTitle.textContent = name;
  missionBadge.textContent = achieved ? text("achievedBadge") : `${Math.round(percent)}%`;
  missionDetail.textContent = achieved
    ? text("missionDone", { name })
    : text("missionDetail", { memo: memo || text("number"), target: isDownMode ? "0" : target, remaining: Math.max(0, remaining) });
}

function renderMiniGraph() {
  const recentEntries = app.history
    .filter((item) => typeof item !== "string" && Number.isFinite(Number(item.count)))
    .slice(0, 8)
    .reverse();

  miniGraph.innerHTML = "";

  if (recentEntries.length === 0) {
    const empty = document.createElement("p");
    empty.className = "empty-graph";
    empty.textContent = text("emptyGraph");
    miniGraph.appendChild(empty);
    return;
  }

  const maxCount = Math.max(1, ...recentEntries.map((item) => Math.abs(Number(item.count))));
  recentEntries.forEach((item) => {
    const graphItem = document.createElement("span");
    const bar = document.createElement("span");
    const label = document.createElement("span");
    const count = Math.abs(Number(item.count));
    graphItem.className = "mini-graph-item";
    bar.className = "mini-graph-bar";
    bar.style.height = `${Math.max(8, (count / maxCount) * 92)}px`;
    bar.title = `${item.counterName ?? text("counterDefault")}: ${item.count}`;
    label.className = "mini-graph-label";
    label.textContent = item.count;
    graphItem.append(bar, label);
    miniGraph.appendChild(graphItem);
  });
}

function playCountEffect(amount) {
  const now = Date.now();
  if (now - lastEffectAt < 170) return;
  lastEffectAt = now;

  countValue.classList.remove("count-pop-plus", "count-pop-minus");
  progressFill.classList.remove("progress-sheen");
  void countValue.offsetWidth;
  void progressFill.offsetWidth;
  countValue.classList.add(amount >= 0 ? "count-pop-plus" : "count-pop-minus");
  progressFill.classList.add("progress-sheen");
}

function playMilestoneEffect() {
  counterPanel.classList.remove("milestone-ring");
  void counterPanel.offsetWidth;
  counterPanel.classList.add("milestone-ring");
}

function render() {
  const target = getTarget();
  const step = getStep();
  const limitMode = limitModeSelect.value;
  const limit = getLimit();
  const isDownMode = countModeSelect.value === "down";
  const remaining = isDownMode ? app.count : target - app.count;
  const progress = isDownMode
    ? Math.min(100, Math.max(0, ((target - app.count) / target) * 100))
    : Math.min(100, Math.max(0, (app.count / target) * 100));

  resetDailyStatsIfNeeded();
  renderCounterOptions();

  countValue.textContent = app.count;
  progressFill.style.width = `${progress}%`;
  progressText.textContent = isDownMode
    ? remaining > 0
      ? text("zeroProgress", { value: remaining })
      : text("zeroReached")
    : remaining > 0
      ? text("targetProgress", { value: remaining })
      : text("targetReachedShort");
  nameStat.textContent = counterNameInput.value.trim() || text("counterDefault");
  stepStat.textContent = text("stepStat", { value: step });
  targetStat.textContent = isDownMode ? text("startStat", { value: target }) : text("targetStat", { value: target });
  remainingStat.textContent = remaining > 0 ? text("remainingStat", { value: remaining }) : text("achieved");
  limitStat.textContent = limitMode === "none" ? text("noLimit") : text("limitStat", { value: limit });
  todayTotalValue.textContent = app.todayTotal;
  todayHighValue.textContent = app.todayHigh;
  document.body.dataset.accent = app.presetAccent;
  renderMission(target, remaining, isDownMode);
  renderMiniGraph();
  undoButton.disabled = app.undoStack.length === 0;
  targetButton.textContent = isDownMode ? text("setStart") : text("setToTarget");
  document.body.classList.toggle("dark", app.dark);
  autoPlusButton.classList.toggle("active", app.autoDirection === 1);
  autoMinusButton.classList.toggle("active", app.autoDirection === -1);
  autoToggleButton.classList.toggle("running", app.autoRunning);
  autoToggleButton.textContent = app.autoRunning ? text("autoStop") : text("autoStart");
  timerToggleButton.classList.toggle("running", app.timerRunning);
  timerToggleButton.textContent = app.timerRunning
    ? text("stop")
    : timerModeSelect.value === "countdown"
      ? text("startCountdown")
      : text("startTimer");
  document.body.classList.toggle("timer-countdown", timerModeSelect.value === "countdown");
  document.body.classList.toggle("timer-active", app.timerRunning);
  timerModeSelect.disabled = app.timerRunning;
  countdownMinutesInput.disabled = app.timerRunning;
  countdownSecondsInput.disabled = app.timerRunning;
  countdownPresetButtons.forEach((button) => {
    button.disabled = app.timerRunning;
  });
  if (!app.timerRunning) {
    const displayTime = formatTime(getTimerDisplayTime());
    timeValue.textContent = displayTime;
    floatingTimeValue.textContent = displayTime;
  }
  applyLanguage();

  historyList.innerHTML = "";
  app.history.slice(0, 8).forEach((item, index) => {
    const listItem = document.createElement("li");
    const text = document.createElement("span");
    const deleteButton = document.createElement("button");

    text.textContent = typeof item === "string" ? item : item.text;
    deleteButton.className = "delete-history-button";
    deleteButton.type = "button";
    deleteButton.textContent = "×";
    deleteButton.setAttribute("aria-label", text("deleteHistoryLabel"));
    deleteButton.dataset.historyIndex = index;

    listItem.append(text, deleteButton);
    historyList.appendChild(listItem);
  });
}

function notifyUser() {
  if (vibrateToggle.checked && "vibrate" in navigator) {
    navigator.vibrate([80, 40, 80]);
  }

  if (!soundToggle.checked) return;
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;

  audioContext = audioContext ?? new AudioContext();
  const oscillator = audioContext.createOscillator();
  const gain = audioContext.createGain();
  oscillator.frequency.value = 740;
  gain.gain.value = 0.08;
  oscillator.connect(gain);
  gain.connect(audioContext.destination);
  oscillator.start();
  oscillator.stop(audioContext.currentTime + 0.12);
}

function addHistory(message, details = {}) {
  const now = new Date();
  const time = now.toLocaleTimeString("ja-JP", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
  });
  const entry = {
    id: Date.now(),
    date: now.toISOString(),
    counterName: counterNameInput.value.trim() || text("counterDefault"),
    text: `${time} ${message}`,
    count: app.count,
    amount: details.amount ?? 0,
    type: details.type ?? "memo",
    memo: memoInput.value.trim(),
  };
  app.history.unshift(entry);
  app.history = app.history.slice(0, 50);
  save();
  render();
}

function updateStats(amount) {
  resetDailyStatsIfNeeded();
  app.todayTotal += Math.abs(amount);
  app.todayHigh = Math.max(app.todayHigh, app.count);
}

function rememberCountForUndo() {
  const previousCount = app.undoStack.at(-1);
  if (previousCount === app.count) return;

  app.undoStack.push(app.count);
  app.undoStack = app.undoStack.slice(-50);
}

function handleMilestones(beforeCount, amount) {
  const target = getTarget();
  const isDownMode = countModeSelect.value === "down";
  const reachedTarget = !isDownMode && amount > 0 && beforeCount < target && app.count >= target;
  const reachedZero = isDownMode && amount < 0 && beforeCount > 0 && app.count <= 0;

  if (reachedTarget) {
    statusText.textContent = text("targetReached", { target });
    addHistory(text("targetHistory", { target, count: app.count, memo: getMemoText() }), { amount, type: "target" });
    notifyUser();
    playMilestoneEffect();
    return true;
  }

  if (reachedZero) {
    app.count = 0;
    statusText.textContent = text("zeroComplete");
    addHistory(text("countdownCountComplete", { memo: getMemoText() }), { amount, type: "target" });
    notifyUser();
    playMilestoneEffect();
    if (app.autoRunning) {
      stopAutoCount(text("autoStopZero"));
    }
    return true;
  }

  return false;
}

function changeCount(amount, message) {
  const beforeCount = app.count;
  const limit = getLimit();
  const limitMode = limitModeSelect.value;
  const isDownMode = countModeSelect.value === "down";
  const nextCount = app.count + amount;
  const undoLengthBefore = app.undoStack.length;
  rememberCountForUndo();

  if (amount > 0 && limitMode === "stop" && nextCount >= limit) {
    const stopAmount = limit - beforeCount;
    if (stopAmount <= 0) {
      if (app.undoStack.length > undoLengthBefore) {
        app.undoStack.pop();
      }
      statusText.textContent = text("alreadyLimit", { limit });
      save();
      render();
      return;
    }

    app.count = limit;
    updateStats(stopAmount);
    statusText.textContent = text("limitStopped", { limit });
    addHistory(text("limitReachedHistory", { limit, count: app.count, memo: getMemoText() }), { amount: stopAmount, type: "limit" });
    notifyUser();
    playCountEffect(stopAmount);
    playMilestoneEffect();
    if (app.autoRunning) {
      stopAutoCount(text("autoStopLimit"));
    }
    save();
    render();
    return;
  }

  if (amount > 0 && limitMode === "loop" && nextCount > limit) {
    app.count = 0;
    updateStats(amount);
    statusText.textContent = text("limitLoop", { limit });
    addHistory(text("limitLoopHistory", { limit, memo: getMemoText() }), { amount, type: "limit" });
    notifyUser();
    playCountEffect(amount);
    playMilestoneEffect();
    save();
    render();
    return;
  }

  const actualAmount = isDownMode && amount < 0 && nextCount < 0 ? -beforeCount : amount;
  app.count = isDownMode && amount < 0 ? Math.max(0, nextCount) : nextCount;
  updateStats(actualAmount);

  if (!handleMilestones(beforeCount, actualAmount)) {
    statusText.textContent = message;
  }

  playCountEffect(actualAmount);
  save();
  render();
}

function resetCount() {
  rememberCountForUndo();
  app.count = 0;
  statusText.textContent = text("resetDone");
  addHistory(text("resetDone"), { type: "reset" });
  save();
  render();
}

function undoLastCount() {
  if (app.undoStack.length === 0) return;

  const restoredCount = app.undoStack.pop();
  app.count = restoredCount;
  statusText.textContent = text("undoDone", { count: restoredCount });
  addHistory(text("undoDone", { count: restoredCount }), { type: "undo" });
  save();
  render();
}

function formatTime(milliseconds) {
  const totalSeconds = Math.floor(milliseconds / 1000);
  const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
  const seconds = String(totalSeconds % 60).padStart(2, "0");
  const tenths = Math.floor((milliseconds % 1000) / 100);
  return `${minutes}:${seconds}.${tenths}`;
}

function getCountdownDuration() {
  const minutes = Math.max(0, Math.floor(safeNumber(countdownMinutesInput.value, 5)));
  const seconds = Math.max(0, Math.floor(safeNumber(countdownSecondsInput.value, 0)));
  return Math.max(1000, (minutes * 60 + Math.min(59, seconds)) * 1000);
}

function getElapsedTime() {
  if (!app.timerRunning) return app.elapsedBeforeStart;
  return app.elapsedBeforeStart + Date.now() - app.timerStartedAt;
}

function getTimerDisplayTime() {
  if (timerModeSelect.value !== "countdown") {
    return getElapsedTime();
  }

  return Math.max(0, getCountdownDuration() - getElapsedTime());
}

function updateTimer() {
  const displayTime = formatTime(getTimerDisplayTime());
  timeValue.textContent = displayTime;
  floatingTimeValue.textContent = displayTime;
  if (timerModeSelect.value === "countdown" && app.timerRunning && !countdownWarned && getTimerDisplayTime() <= 3000) {
    countdownWarned = true;
    statusText.textContent = text("countdownWarn");
  }
  if (timerModeSelect.value === "countdown" && app.timerRunning && getElapsedTime() >= getCountdownDuration()) {
    finishCountdown();
    return;
  }

  if (app.timerRunning) {
    app.timerFrameId = requestAnimationFrame(updateTimer);
  }
}

function startTimer() {
  if (timerModeSelect.value === "countdown" && app.elapsedBeforeStart >= getCountdownDuration()) {
    app.elapsedBeforeStart = 0;
  }
  countdownWarned = false;
  app.timerRunning = true;
  app.timerStartedAt = Date.now();
  updateTimer();
  if (autoCountToggle.checked && !app.autoRunning) {
    startAutoCount();
  }
  addHistory(
    timerModeSelect.value === "countdown"
      ? text("countdownStartHistory", { time: formatTime(getCountdownDuration()) })
      : text("timerStartHistory"),
    { type: "timer" }
  );
}

function stopTimer() {
  app.elapsedBeforeStart = getElapsedTime();
  app.timerRunning = false;
  cancelAnimationFrame(app.timerFrameId);
  if (stopAutoWithTimerToggle.checked && app.autoRunning) {
    stopAutoCount(text("timerStopAuto"));
  }
  addHistory(
    timerModeSelect.value === "countdown"
      ? text("countdownStopHistory", { time: formatTime(getTimerDisplayTime()) })
      : text("timerStopHistory", { time: formatTime(getTimerDisplayTime()) }),
    { type: "timer" }
  );
}

function finishCountdown() {
  const completedDuration = getCountdownDuration();
  app.elapsedBeforeStart = getCountdownDuration();
  app.timerRunning = false;
  cancelAnimationFrame(app.timerFrameId);
  timeValue.textContent = "00:00.0";
  statusText.textContent = text("timerDone");
  addHistory(text("countdownDoneHistory", { time: formatTime(completedDuration), count: app.count, memo: getMemoText() }), { type: "timer" });
  notifyUser();
  playMilestoneEffect();
  if (stopAutoWithTimerToggle.checked && app.autoRunning) {
    app.autoRunning = false;
    clearInterval(app.autoTimerId);
  }
  render();
}

function startAutoCount() {
  const seconds = Math.max(1, Math.abs(safeNumber(intervalInput.value, 1)));
  app.autoRunning = true;
  clearInterval(app.autoTimerId);
  app.autoTimerId = setInterval(() => {
    changeCount(app.autoDirection * getStep(), text("autoCounting"));
  }, seconds * 1000);
  addHistory(text("autoStartHistory", { seconds }), { type: "auto" });
}

function stopAutoCount(message = text("autoStop")) {
  app.autoRunning = false;
  clearInterval(app.autoTimerId);
  addHistory(message, { type: "auto" });
}

function setCountToTarget() {
  const target = getTarget();
  rememberCountForUndo();
  app.count = target;
  app.todayHigh = Math.max(app.todayHigh, app.count);
  statusText.textContent = countModeSelect.value === "down"
    ? text("startFromTarget", { target })
    : text("targetSet", { target });
  addHistory(`${statusText.textContent} / ${text("number")} ${app.count}${getMemoText()}`, { type: "target" });
  playMilestoneEffect();
  save();
  render();
}

function applyPreset() {
  const preset = presets[presetSelect.value];
  if (!preset) return;

  counterNameInput.value = presetLabel(presetSelect.value);
  stepInput.value = preset.step;
  targetInput.value = preset.target;
  limitInput.value = preset.limit;
  limitModeSelect.value = "none";
  countModeSelect.value = "up";
  app.presetAccent = preset.accent;
  memoInput.value = presetMemo(presetSelect.value);
  statusText.textContent = text("presetApplied", { name: presetLabel(presetSelect.value) });
  addHistory(text("presetHistory", { name: presetLabel(presetSelect.value) }), { type: "preset" });
  save();
  render();
}

function exportCsv() {
  const rows = [["date", "counter", "type", "amount", "count", "memo", "text"]];
  app.counters.forEach((counter) => {
    (counter.history ?? []).forEach((item) => {
      const entry = typeof item === "string" ? { text: item } : item;
      rows.push([
        entry.date ?? "",
        entry.counterName ?? counter.name ?? "",
        entry.type ?? "",
        entry.amount ?? "",
        entry.count ?? "",
        entry.memo ?? "",
        entry.text ?? "",
      ]);
    });
  });

  const csv = rows
    .map((row) => row.map((value) => `"${String(value).replaceAll('"', '""')}"`).join(","))
    .join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "counter-history.csv";
  link.click();
  URL.revokeObjectURL(url);
}

function startHold(button, amount) {
  let holdTimerId = null;
  let repeatTimerId = null;
  let repeated = false;
  let activePointerId = null;

  function clearHold() {
    clearTimeout(holdTimerId);
    clearInterval(repeatTimerId);
    holdTimerId = null;
    repeatTimerId = null;
    activePointerId = null;
  }

  button.addEventListener("pointerdown", (event) => {
    if (activePointerId !== null) return;
    activePointerId = event.pointerId;
    button.setPointerCapture?.(event.pointerId);
    repeated = false;
    holdTimerId = setTimeout(() => {
      repeated = true;
      repeatTimerId = setInterval(() => {
        changeCount(amount(), text("holdCounting"));
      }, 130);
    }, 450);
  });

  ["pointerup", "pointerleave", "pointercancel"].forEach((eventName) => {
    button.addEventListener(eventName, (event) => {
      if (activePointerId !== null && event.pointerId !== activePointerId) return;
      clearHold();
      if (repeated) {
        button.dataset.skipClick = "true";
      }
    });
  });
}

plusButton.addEventListener("click", () => {
  if (plusButton.dataset.skipClick === "true") {
    plusButton.dataset.skipClick = "false";
    return;
  }
  changeCount(getStep(), text("plusDone", { step: getStep() }));
});

minusButton.addEventListener("click", () => {
  if (minusButton.dataset.skipClick === "true") {
    minusButton.dataset.skipClick = "false";
    return;
  }
  changeCount(-getStep(), text("minusDone", { step: getStep() }));
});

startHold(plusButton, () => getStep());
startHold(minusButton, () => -getStep());

quickButtons.forEach((button) => {
  button.addEventListener("click", () => {
    const amount = safeNumber(button.dataset.quick, 0);
    changeCount(amount, text("quickDone", { amount }));
  });
});

inlineResetButton.addEventListener("click", resetCount);
resetButton.addEventListener("click", resetCount);
undoButton.addEventListener("click", undoLastCount);
applyPresetButton.addEventListener("click", applyPreset);

targetButton.addEventListener("click", () => {
  if (countModeSelect.value === "down") {
    setCountToTarget();
    return;
  }

  const target = getTarget();
  const difference = target - app.count;
  if (difference === 0) {
    statusText.textContent = text("targetAlready", { target });
    addHistory(text("targetAlreadyHistory", { target, count: app.count, memo: getMemoText() }), { type: "target" });
    return;
  }
  changeCount(difference, text("targetSet", { target }));
});

timerToggleButton.addEventListener("click", () => {
  if (app.timerRunning) {
    stopTimer();
  } else {
    startTimer();
  }
  render();
});

timerResetButton.addEventListener("click", () => {
  app.timerRunning = false;
  app.elapsedBeforeStart = 0;
  countdownWarned = false;
  cancelAnimationFrame(app.timerFrameId);
  if (stopAutoWithTimerToggle.checked && app.autoRunning) {
    stopAutoCount(text("timerResetAuto"));
  }
  timeValue.textContent = formatTime(getTimerDisplayTime());
  addHistory(timerModeSelect.value === "countdown" ? text("countdownReset") : text("timerResetHistory"), { type: "timer" });
  render();
});

lapButton.addEventListener("click", () => {
  const timerStatus = app.timerRunning ? text("lapRunning") : text("lapStopped");
  addHistory(text("lapHistory", { status: timerStatus, time: formatTime(getTimerDisplayTime()), count: app.count, memo: getMemoText() }), { type: "lap" });
});

countdownPresetButtons.forEach((button) => {
  button.addEventListener("click", () => {
    if (app.timerRunning) return;
    const seconds = Math.max(1, safeNumber(button.dataset.countdownPreset, 300));
    countdownMinutesInput.value = String(Math.floor(seconds / 60));
    countdownSecondsInput.value = String(seconds % 60);
    app.elapsedBeforeStart = 0;
    statusText.textContent = text("countdownPresetSet", { minutes: Math.floor(seconds / 60), seconds: seconds % 60 });
    save();
    render();
  });
});

memoPresetButtons.forEach((button) => {
  button.addEventListener("click", () => {
    const key = button.dataset.memoPreset;
    memoInput.value = presetMemo(key);
    statusText.textContent = text("memoPresetSet", { memo: memoInput.value });
    save();
    render();
  });
});

autoPlusButton.addEventListener("click", () => {
  app.autoDirection = 1;
  render();
});

autoMinusButton.addEventListener("click", () => {
  app.autoDirection = -1;
  render();
});

autoToggleButton.addEventListener("click", () => {
  if (app.autoRunning) {
    stopAutoCount();
  } else {
    startAutoCount();
  }
  render();
});

addCounterButton.addEventListener("click", () => {
  if (app.autoRunning) {
    stopAutoCount(text("addCounterAutoStop"));
  }
  saveActiveCounter();
  const counter = makeCounter(`${text("counterDefault")}${app.counters.length + 1}`);
  app.counters.push(counter);
  applyCounter(counter);
  statusText.textContent = text("counterAdded");
  save();
  render();
});

deleteCounterButton.addEventListener("click", () => {
  if (app.counters.length <= 1) return;
  if (app.autoRunning) {
    stopAutoCount(text("deleteCounterAutoStop"));
  }
  app.counters = app.counters.filter((counter) => counter.id !== app.currentCounterId);
  applyCounter(app.counters[0]);
  statusText.textContent = text("counterDeleted");
  save();
  render();
});

counterSelect.addEventListener("change", () => {
  if (app.autoRunning) {
    stopAutoCount(text("switchCounterAutoStop"));
  }
  saveActiveCounter();
  applyCounter(app.counters.find((counter) => counter.id === counterSelect.value) ?? app.counters[0]);
  statusText.textContent = text("counterSwitched");
  save();
  render();
});

counterNameInput.addEventListener("input", () => {
  save();
  render();
});

clearHistoryButton.addEventListener("click", () => {
  app.history = [];
  save();
  render();
});

todayResetButton.addEventListener("click", () => {
  app.todayTotal = 0;
  app.todayHigh = Math.max(0, app.count);
  statusText.textContent = text("todayResetDone");
  addHistory(text("todayResetDone"), { type: "reset" });
});

historyList.addEventListener("click", (event) => {
  const button = event.target.closest(".delete-history-button");
  if (!button) return;
  app.history.splice(Number(button.dataset.historyIndex), 1);
  save();
  render();
});

exportCsvButton.addEventListener("click", exportCsv);

themeButton.addEventListener("click", () => {
  app.dark = !app.dark;
  save();
  render();
});

languageSelect.addEventListener("change", () => {
  save();
  render();
});

[countModeSelect, stepInput, targetInput, limitInput, limitModeSelect, timerModeSelect, countdownMinutesInput, countdownSecondsInput, intervalInput, memoInput, stopAutoWithTimerToggle, autoCountToggle, soundToggle, vibrateToggle].forEach((input) => {
  input.addEventListener("input", () => {
    if ((input === timerModeSelect || input === countdownMinutesInput || input === countdownSecondsInput) && !app.timerRunning) {
      app.elapsedBeforeStart = 0;
    }
    save();
    render();
  });
  input.addEventListener("change", () => {
    if ((input === timerModeSelect || input === countdownMinutesInput || input === countdownSecondsInput) && !app.timerRunning) {
      app.elapsedBeforeStart = 0;
    }
    save();
    render();
  });
});

document.addEventListener("keydown", (event) => {
  const tagName = document.activeElement?.tagName;
  if (["INPUT", "TEXTAREA", "SELECT"].includes(tagName)) return;

  if (event.key === "+" || event.key === "=") {
    changeCount(getStep(), text("plusDone", { step: getStep() }));
  } else if (event.key === "-") {
    changeCount(-getStep(), text("minusDone", { step: getStep() }));
  } else if (event.key === "0") {
    resetCount();
  } else if (event.key.toLowerCase() === "u") {
    undoLastCount();
  }
});

load();
render();

    </script>
  </body>
